<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Username Availability</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/client.css" />
  </head>
  <body>
    <div class="background-glow" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">Username Checker</p>
        <h1>Pick a username that is uniquely yours.</h1>
        <p class="subtitle">Powered by Fastify and Trie.</p>
      </header>

      <section class="panel" aria-labelledby="username-form-title">
        <h2 id="username-form-title">Validate Username</h2>
        <form id="username-form" class="username-form" novalidate>
          <label for="username-input" class="sr-only">Username</label>
          <div class="input-wrap">
            <input
              id="username-input"
              name="username"
              type="text"
              minlength="3"
              maxlength="20"
              autocomplete="off"
              placeholder="Try: rainydawn"
              aria-describedby="input-help status-message"
            />
            <button type="submit">Check</button>
          </div>
          <p id="input-help" class="helper">
            Use 3-20 chars: letters, numbers, underscore, dot.
          </p>
        </form>
        <p
          id="status-message"
          class="status"
          role="status"
          aria-live="polite"
        ></p>

        <div id="suggestions-box" class="suggestions hidden" aria-live="polite">
          <h3>Available Suggestions</h3>
          <ul id="suggestions-list"></ul>
        </div>
      </section>

      <section class="panel" aria-labelledby="username-list-title">
        <div class="list-head">
          <h2 id="username-list-title">Current Usernames (Fake Data)</h2>
          <span id="username-count" class="count-pill">0 names</span>
        </div>
        <ul id="username-list" class="username-list"></ul>
      </section>
    </main>

    <script src="/client.js" defer></script>
  </body>
</html>
