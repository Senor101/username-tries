<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Username Availability</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              body: ['DM Sans', 'sans-serif'],
              heading: ['Space Grotesk', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-amber-50 via-slate-50 to-emerald-50 font-body text-slate-900">
    <div
      class="pointer-events-none fixed -left-24 -top-24 h-[48vw] w-[48vw] rounded-full bg-[radial-gradient(circle,rgba(16,185,129,0.26)_0%,rgba(16,185,129,0)_70%)]"
      aria-hidden="true"
    ></div>

    <main class="mx-auto grid w-[min(920px,calc(100%-2rem))] gap-4 py-10">
      <header class="px-1">
        <p class="font-heading text-xs font-bold uppercase tracking-[0.14em] text-teal-700">Username Checker</p>
        <h1 class="mt-2 font-heading text-3xl font-bold leading-tight md:text-4xl">Pick a username that is uniquely yours.</h1>
        <p class="mt-3 max-w-3xl text-base text-slate-600">Powered by Fastify and Trie.</p>
      </header>

      <section class="rounded-2xl border border-slate-200/80 bg-white/85 p-5 shadow-[0_18px_40px_rgba(17,35,29,0.12)] backdrop-blur-sm" aria-labelledby="username-form-title">
        <h2 id="username-form-title" class="font-heading text-xl font-semibold">Validate Username</h2>
        <form id="username-form" class="mt-4" novalidate>
          <label for="username-input" class="sr-only">Username</label>
          <div class="flex flex-col items-stretch gap-3 md:flex-row md:items-center">
            <input
              id="username-input"
              name="username"
              type="text"
              minlength="3"
              maxlength="20"
              autocomplete="off"
              placeholder="Try: rainydawn"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-base text-slate-900 shadow-sm transition focus:border-teal-600 focus:outline-none focus:ring-4 focus:ring-teal-600/25"
              aria-describedby="input-help status-message"
            />
            <button
              id="username-submit"
              type="submit"
              class="rounded-xl bg-gradient-to-r from-teal-700 to-teal-800 px-4 py-3 text-sm font-bold text-white transition hover:-translate-y-px hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-60"
            >
              Check and Save
            </button>
          </div>
          <p id="input-help" class="mt-2 text-sm text-slate-600">
            Use 3-20 chars: letters, numbers, underscore, dot.
          </p>
        </form>
        <p
          id="status-message"
          class="mt-3 min-h-6 text-sm font-semibold text-slate-700"
          role="status"
          aria-live="polite"
        ></p>

        <div id="suggestions-box" class="mt-3 hidden rounded-xl border border-dashed border-slate-300 bg-white/70 p-3" aria-live="polite">
          <h3 class="font-heading text-base font-semibold">Available Suggestions</h3>
          <ul id="suggestions-list" class="mt-3 flex flex-wrap gap-2"></ul>
        </div>
      </section>

      <section class="rounded-2xl border border-slate-200/80 bg-white/85 p-5 shadow-[0_18px_40px_rgba(17,35,29,0.12)] backdrop-blur-sm" aria-labelledby="username-list-title">
        <div class="flex items-center justify-between gap-3">
          <h2 id="username-list-title" class="font-heading text-xl font-semibold">Current Usernames</h2>
          <span id="username-count" class="rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-bold text-emerald-700">0 names</span>
        </div>
        <ul id="username-list" class="mt-4 grid gap-2"></ul>
      </section>
    </main>

    <script type="module" src="/client/scripts/main.js"></script>
  </body>
</html>
